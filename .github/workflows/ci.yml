name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Public repo → GitHub-hosted runners are free with unlimited minutes.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Installs the exact node + bun pinned in mise.toml.
      - uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Quality gate (typecheck + test + build)
        run: mise run check
