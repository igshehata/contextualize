# mise-en-place: pinned toolchain + task runner for contextualize.
# Run `mise install` to provision the exact node/bun below, then `mise tasks`
# to list everything. Tasks delegate to package.json scripts so there is one
# source of truth for the build commands.

[tools]
node = "26.4.0"
bun = "1.3.14"

[tasks.install]
description = "Install dependencies"
run = "bun install"

[tasks.setup]
description = "Install deps and wire the local git pre-push hook (no CI needed)"
run = [
  "bun install",
  "git config core.hooksPath scripts/githooks",
  "echo '✓ pre-push hook installed — git push now runs mise run check'",
]

[tasks.build]
description = "Bundle the plugin to dist/"
run = "bun run build"

[tasks.lint]
description = "Lint with oxc (oxlint)"
run = "bun run lint"

[tasks.typecheck]
description = "Type-check the source (no emit)"
run = "bun run typecheck"

[tasks.test]
description = "Run unit tests"
run = "bun run test"

[tasks.dev]
description = "Rebuild on file changes"
run = "bun run dev"

[tasks.clean]
description = "Remove build output"
run = "rm -rf dist"

[tasks.check]
description = "Full quality gate: lint, typecheck, test, build"
depends = ["lint", "typecheck", "test", "build"]

[tasks.verify]
description = "Live load-test: load the built plugin in opencode and assert it injects its kit"
depends = ["build"]
run = "./scripts/smoke.sh"
